services:
  - type: web
    name: mary-vision-center
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SESSION_SECRET
        value: mvc-vision-2024-mary-secret-xk9
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: mvc-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
